<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin – RBLX//STUDIO</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg-deep:    #020818;
      --bg-mid:     #050f2e;
      --bg-panel:   #080f1f;
      --blue-core:  #1a6bff;
      --blue-glow:  #4d9aff;
      --blue-dim:   #0d3a8a;
      --cyan:       #00d4ff;
      --cyan-dim:   #006d82;
      --accent:     #00ffcc;
      --red:        #ff4a6e;
      --text-main:  #e8f4ff;
      --text-muted: #6a8db0;
      --text-dim:   #3a5a7a;
      --border:     rgba(26,107,255,0.2);
      --border-hi:  rgba(0,212,255,0.5);
      --glass:      rgba(8,15,31,0.85);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Rajdhani', sans-serif;
      background: var(--bg-deep); color: var(--text-main);
      min-height: 100vh; overflow-x: hidden;
    }

    body::before {
      content: ''; position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(26,107,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(26,107,255,0.04) 1px, transparent 1px);
      background-size: 60px 60px; pointer-events: none; z-index: 0;
    }

    /* ── LOCK SCREEN ── */
    #lockScreen {
      position: fixed; inset: 0;
      background: var(--bg-deep);
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; z-index: 9999;
    }

    .lock-box {
      background: var(--glass); border: 1px solid var(--border-hi);
      padding: 60px 48px; width: 420px; max-width: 90vw;
      text-align: center; backdrop-filter: blur(20px);
    }

    .lock-icon {
      width: 60px; height: 60px; color: var(--cyan);
      margin: 0 auto 28px;
    }

    .lock-box h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 1rem; letter-spacing: 4px;
      color: var(--text-muted); margin-bottom: 8px;
    }

    .lock-box h2 {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.4rem; letter-spacing: 2px;
      color: var(--text-main); margin-bottom: 32px;
    }

    .lock-input {
      width: 100%; background: rgba(26,107,255,0.05);
      border: 1px solid var(--border); color: var(--text-main);
      font-family: 'Rajdhani', sans-serif; font-size: 1.1rem;
      padding: 14px 20px; outline: none; transition: border-color 0.3s;
      text-align: center; letter-spacing: 4px; margin-bottom: 20px;
    }

    .lock-input:focus { border-color: var(--cyan); }

    .lock-btn {
      width: 100%; background: linear-gradient(135deg, var(--blue-core), var(--blue-glow));
      border: none; color: white; font-family: 'Rajdhani', sans-serif;
      font-weight: 700; font-size: 1rem; letter-spacing: 3px;
      text-transform: uppercase; padding: 14px; cursor: pointer; transition: all 0.3s;
    }

    .lock-btn:hover { box-shadow: 0 0 30px rgba(26,107,255,0.5); }

    .lock-error {
      color: var(--red); font-size: 0.85rem; letter-spacing: 1px;
      margin-top: 14px; min-height: 20px;
    }

    /* ── ADMIN LAYOUT ── */
    #adminPanel { display: none; }

    .admin-nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px; height: 70px;
      background: rgba(2,8,24,0.95); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--red);
    }

    .admin-logo {
      font-family: 'Orbitron', sans-serif; font-weight: 900;
      font-size: 0.9rem; letter-spacing: 3px;
      color: var(--red);
    }

    .admin-badge {
      background: var(--red); color: white;
      font-size: 0.65rem; letter-spacing: 3px; text-transform: uppercase;
      padding: 4px 12px; font-family: 'Orbitron', sans-serif;
    }

    .admin-exit {
      background: transparent; border: 1px solid var(--red);
      color: var(--red); font-family: 'Rajdhani', sans-serif;
      font-weight: 600; font-size: 0.8rem; letter-spacing: 2px;
      text-transform: uppercase; padding: 7px 16px; cursor: pointer;
      text-decoration: none; transition: all 0.3s;
    }

    .admin-exit:hover { background: rgba(255,74,110,0.1); }

    /* ── ADMIN CONTENT ── */
    .admin-content {
      position: relative; z-index: 1;
      max-width: 1100px; margin: 0 auto;
      padding: 100px 40px 80px;
    }

    .admin-section-title {
      font-family: 'Orbitron', sans-serif; font-size: 0.65rem;
      letter-spacing: 5px; text-transform: uppercase; color: var(--red);
      margin-bottom: 8px;
    }

    h2.admin-h2 {
      font-family: 'Orbitron', sans-serif; font-size: 1.4rem;
      font-weight: 700; color: var(--text-main); margin-bottom: 32px;
    }

    /* ADD ASSET FORM */
    .add-form {
      background: var(--glass); border: 1px solid var(--border);
      padding: 40px; backdrop-filter: blur(10px); margin-bottom: 60px;
    }

    .add-form h3 {
      font-family: 'Orbitron', sans-serif; font-size: 0.85rem;
      letter-spacing: 3px; color: var(--cyan); margin-bottom: 28px;
    }

    .form-row {
      display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;
    }

    .form-group { display: flex; flex-direction: column; }

    .form-group label {
      font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: 8px;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      background: rgba(26,107,255,0.05); border: 1px solid var(--border);
      color: var(--text-main); font-family: 'Rajdhani', sans-serif;
      font-size: 1rem; padding: 12px 16px; outline: none;
      transition: border-color 0.3s;
    }

    .form-group textarea { resize: vertical; min-height: 80px; }
    .form-group select { cursor: pointer; }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus { border-color: var(--cyan); }

    .form-group select option { background: var(--bg-mid); }

    .form-full { grid-column: 1 / -1; }

    .media-type-row {
      display: flex; gap: 16px; align-items: center; margin-bottom: 20px;
    }

    .media-radio {
      display: flex; align-items: center; gap: 8px;
      color: var(--text-muted); font-size: 0.9rem; cursor: pointer;
    }

    .media-radio input { accent-color: var(--cyan); }

    .submit-row {
      display: flex; gap: 16px; align-items: center; margin-top: 8px;
    }

    .admin-btn {
      background: linear-gradient(135deg, var(--blue-core), var(--blue-glow));
      border: none; color: white; font-family: 'Rajdhani', sans-serif;
      font-weight: 700; font-size: 0.9rem; letter-spacing: 3px;
      text-transform: uppercase; padding: 14px 32px; cursor: pointer;
      clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
      transition: all 0.3s;
    }

    .admin-btn:hover { box-shadow: 0 0 30px rgba(26,107,255,0.5); }

    .admin-btn.danger {
      background: linear-gradient(135deg, #8a0d1a, var(--red));
    }

    .admin-btn.danger:hover { box-shadow: 0 0 30px rgba(255,74,110,0.5); }

    .form-status {
      color: var(--accent); font-size: 0.85rem; letter-spacing: 1px;
    }

    /* ASSETS TABLE */
    .assets-table-wrap { overflow-x: auto; }

    table {
      width: 100%; border-collapse: collapse; font-size: 0.9rem;
    }

    thead th {
      text-align: left; font-family: 'Orbitron', sans-serif;
      font-size: 0.65rem; letter-spacing: 3px; text-transform: uppercase;
      color: var(--text-muted); padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }

    tbody tr {
      border-bottom: 1px solid var(--border); transition: background 0.2s;
    }

    tbody tr:hover { background: rgba(26,107,255,0.05); }

    tbody td {
      padding: 14px 16px; color: var(--text-main); vertical-align: middle;
    }

    .table-title { font-weight: 600; max-width: 200px; }

    .table-cat {
      display: inline-block; border: 1px solid var(--border);
      color: var(--blue-glow); font-size: 0.7rem; letter-spacing: 2px;
      text-transform: uppercase; padding: 2px 8px;
    }

    .del-btn {
      background: transparent; border: 1px solid var(--red);
      color: var(--red); font-family: 'Rajdhani', sans-serif;
      font-weight: 600; font-size: 0.75rem; letter-spacing: 1px;
      text-transform: uppercase; padding: 5px 14px; cursor: pointer;
      transition: all 0.2s;
    }

    .del-btn:hover { background: rgba(255,74,110,0.1); }

    .empty-row td {
      text-align: center; padding: 60px; color: var(--text-dim);
      font-size: 0.85rem; letter-spacing: 2px;
    }

    .spinner {
      width: 32px; height: 32px; border: 2px solid var(--border);
      border-top-color: var(--cyan); border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 768px) {
      .admin-nav { padding: 0 20px; }
      .admin-content { padding: 90px 20px 60px; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- LOCK SCREEN -->
  <div id="lockScreen">
    <div class="lock-box">
      <svg class="lock-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      <h1>RESTRICTED ACCESS</h1>
      <h2>Admin Panel</h2>
      <input class="lock-input" type="password" id="adminPass" placeholder="••••••••••••" autocomplete="off"/>
      <button class="lock-btn" id="unlockBtn">UNLOCK</button>
      <div class="lock-error" id="lockError"></div>
    </div>
  </div>

  <!-- ADMIN PANEL -->
  <div id="adminPanel">
    <nav class="admin-nav">
      <div class="admin-logo">⬡ ADMIN CONSOLE</div>
      <div class="admin-badge">Restricted</div>
      <a href="index.html" class="admin-exit">← Exit to Site</a>
    </nav>

    <div class="admin-content">
      <div class="admin-section-title">Admin Console</div>
      <h2 class="admin-h2">Manage Assets</h2>

      <!-- ADD FORM -->
      <div class="add-form">
        <h3>+ Add New Asset</h3>
        <div class="form-row">
          <div class="form-group">
            <label>Asset Title *</label>
            <input type="text" id="aTitle" placeholder="e.g. Combat Framework v2"/>
          </div>
          <div class="form-group">
            <label>Category *</label>
            <select id="aCategory">
              <option value="script">Script</option>
              <option value="model">Model</option>
              <option value="ui">UI</option>
              <option value="animation">Animation</option>
              <option value="other">Other</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group form-full">
            <label>Description *</label>
            <textarea id="aDesc" placeholder="Describe the asset — what it does, how to use it…"></textarea>
          </div>
        </div>

        <div style="margin-bottom: 8px;">
          <label style="font-size:0.7rem; letter-spacing:2px; text-transform:uppercase; color:var(--text-muted); display:block; margin-bottom:10px;">Media Type</label>
          <div class="media-type-row">
            <label class="media-radio"><input type="radio" name="mediaType" value="image" checked/> Image</label>
            <label class="media-radio"><input type="radio" name="mediaType" value="video"/> Video</label>
            <label class="media-radio"><input type="radio" name="mediaType" value="none"/> No Media</label>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Media URL (image or video link)</label>
            <input type="url" id="aMediaUrl" placeholder="https://…"/>
          </div>
          <div class="form-group">
            <label>Download URL *</label>
            <input type="url" id="aDownloadUrl" placeholder="https://drive.google.com/…"/>
          </div>
        </div>

        <div class="submit-row">
          <button class="admin-btn" id="addAssetBtn">Add Asset</button>
          <span class="form-status" id="formStatus"></span>
        </div>
      </div>

      <!-- ASSETS TABLE -->
      <div class="admin-section-title">Existing Assets</div>
      <h2 class="admin-h2" style="margin-bottom:24px;">All Assets</h2>

      <div class="assets-table-wrap">
        <table>
          <thead>
            <tr>
              <th>Title</th>
              <th>Category</th>
              <th>Downloads</th>
              <th>Media</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="adminTableBody">
            <tr>
              <td colspan="5" style="text-align:center; padding:40px;">
                <div class="spinner"></div>
                <div style="color:var(--text-muted); font-size:0.8rem; letter-spacing:2px;">Loading…</div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- FIREBASE SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script>
    const ADMIN_PASSWORD = 'greylemob21';

    // ── LOCK / UNLOCK ──
    function tryUnlock() {
      const pass = document.getElementById('adminPass').value;
      if (pass === ADMIN_PASSWORD) {
        document.getElementById('lockScreen').style.display = 'none';
        document.getElementById('adminPanel').style.display = 'block';
        loadAdminAssets();
      } else {
        document.getElementById('lockError').textContent = 'Incorrect password. Access denied.';
        document.getElementById('adminPass').value = '';
        document.getElementById('adminPass').style.borderColor = '#ff4a6e';
        setTimeout(() => {
          document.getElementById('lockError').textContent = '';
          document.getElementById('adminPass').style.borderColor = '';
        }, 2500);
      }
    }

    document.getElementById('unlockBtn').onclick = tryUnlock;
    document.getElementById('adminPass').addEventListener('keydown', e => {
      if (e.key === 'Enter') tryUnlock();
    });

    // ── LOAD ASSETS ──
    async function loadAdminAssets() {
      const tbody = document.getElementById('adminTableBody');
      try {
        const snap = await db.collection('assets').orderBy('createdAt', 'desc').get();
        if (snap.empty) {
          tbody.innerHTML = '<tr class="empty-row"><td colspan="5">No assets yet. Add one above.</td></tr>';
          return;
        }
        tbody.innerHTML = snap.docs.map(doc => {
          const a = doc.data();
          return `<tr>
            <td class="table-title">${escHtml(a.title)}</td>
            <td><span class="table-cat">${a.category || '—'}</span></td>
            <td>${a.downloadCount || 0}</td>
            <td>${a.mediaUrl ? `<a href="${a.mediaUrl}" target="_blank" style="color:var(--cyan); font-size:0.8rem;">View</a>` : '—'}</td>
            <td><button class="del-btn" onclick="deleteAsset('${doc.id}', this)">Delete</button></td>
          </tr>`;
        }).join('');
      } catch(e) {
        tbody.innerHTML = `<tr class="empty-row"><td colspan="5">Error loading: ${e.message}</td></tr>`;
      }
    }

    // ── ADD ASSET ──
    document.getElementById('addAssetBtn').onclick = async () => {
      const title       = document.getElementById('aTitle').value.trim();
      const category    = document.getElementById('aCategory').value;
      const description = document.getElementById('aDesc').value.trim();
      const mediaUrl    = document.getElementById('aMediaUrl').value.trim();
      const downloadUrl = document.getElementById('aDownloadUrl').value.trim();
      const mediaType   = document.querySelector('input[name="mediaType"]:checked').value;
      const status      = document.getElementById('formStatus');

      if (!title || !description || !downloadUrl) {
        status.style.color = '#ff4a6e';
        status.textContent = '✕ Title, description and download URL are required.';
        return;
      }

      status.style.color = 'var(--accent)';
      status.textContent = 'Saving…';

      try {
        await db.collection('assets').add({
          title, category, description,
          mediaUrl: mediaUrl || null,
          mediaType: mediaType === 'none' ? null : mediaType,
          downloadUrl,
          downloadCount: 0,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        status.textContent = '✓ Asset added successfully!';
        document.getElementById('aTitle').value = '';
        document.getElementById('aDesc').value = '';
        document.getElementById('aMediaUrl').value = '';
        document.getElementById('aDownloadUrl').value = '';
        document.querySelector('input[name="mediaType"][value="image"]').checked = true;
        loadAdminAssets();
        setTimeout(() => { status.textContent = ''; }, 3000);
      } catch(e) {
        status.style.color = '#ff4a6e';
        status.textContent = '✕ Error: ' + e.message;
      }
    };

    // ── DELETE ──
    async function deleteAsset(id, btn) {
      if (!confirm('Delete this asset? This cannot be undone.')) return;
      btn.disabled = true;
      btn.textContent = '…';
      try {
        await db.collection('assets').doc(id).delete();
        loadAdminAssets();
      } catch(e) {
        alert('Error deleting: ' + e.message);
        btn.disabled = false;
        btn.textContent = 'Delete';
      }
    }

    function escHtml(str) {
      if (!str) return '';
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  </script>
</body>
</html>
